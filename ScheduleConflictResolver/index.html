<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Schedule Conflict Resolver | Devika Ramkaran</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        html, body { margin: 0; padding: 0; background: #E4EAF0; min-height: 100vh; }
        body { font-family: 'Inter', sans-serif; color: #2A3547; -webkit-font-smoothing: antialiased; }
        * { box-sizing: border-box; }
        button { cursor: pointer; border: none; font-family: inherit; }
        /* Preserve the custom scrollbar logic from your app.jsx */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #E4EAF0; }
        ::-webkit-scrollbar-thumb { background: #6B7FAB; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        // --- THE FULL APP.JSX LOGIC ---
        const COLORS = {
            background: "#E4EAF0", cardBg: "#FAFBFD", cardBgMuted: "#EEF1F5",
            text: "#2A3547", textSecondary: "#566175", textTertiary: "#7F8A9C",
            borderColor: "rgba(42, 53, 71, 0.14)", borderStrong: "rgba(42, 53, 71, 0.32)",
            accent: "#6B7FAB", accentDim: "rgba(107, 127, 171, 0.18)",
            critical: "#E6D4E1", criticalText: "#8C5E7F"
        };

        const DATA = [
            { id: 1, title: "Investment Strategy Review", time: "09:00 - 10:30", type: "Executive", priority: 5, conflict: true },
            { id: 2, title: "Ops Sync: ScholarshipOwl", time: "10:00 - 11:00", type: "Operations", priority: 3, conflict: true },
            { id: 3, title: "AI Data Training Quality Check", time: "13:00 - 14:00", type: "Production", priority: 4, conflict: false }
        ];

        const App = () => {
            const [selectedDate, setSelectedDate] = useState('April 15, 2026');

            return (
                <main style={{ maxWidth: '1200px', margin: '0 auto', padding: '40px 20px' }}>
                    <header style={{ marginBottom: '40px' }}>
                        <h1 style={{ fontSize: '38px', fontWeight: '700', letterSpacing: '-0.02em' }}>Schedule Conflict Resolver</h1>
                        <p style={{ color: COLORS.textSecondary }}>Operational Intelligence Dashboard</p>
                    </header>

                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 350px', gap: '32px' }}>
                        {/* Conflict Feed */}
                        <section>
                            <div style={{ background: COLORS.cardBg, borderRadius: '16px', padding: '24px', border: `1px solid ${COLORS.borderColor}` }}>
                                <h3 style={{ marginBottom: '20px' }}>Identified Conflicts</h3>
                                {DATA.map(item => (
                                    <div key={item.id} style={{ 
                                        padding: '16px', 
                                        marginBottom: '12px', 
                                        borderRadius: '12px', 
                                        background: item.conflict ? COLORS.critical : COLORS.cardBgMuted,
                                        border: `1px solid ${item.conflict ? COLORS.criticalText : 'transparent'}`
                                    }}>
                                        <div style={{ fontWeight: '600' }}>{item.title}</div>
                                        <div style={{ fontSize: '14px', color: COLORS.textSecondary }}>{item.time} • Priority {item.priority}</div>
                                    </div>
                                ))}
                            </div>
                        </section>

                        {/* Analysis Sidebar */}
                        <aside>
                            <div style={{ background: COLORS.text, color: '#FFF', borderRadius: '16px', padding: '24px' }}>
                                <h4 style={{ color: COLORS.accent }}>Conflict Score</h4>
                                <div style={{ fontSize: '48px', fontWeight: '700', margin: '12px 0' }}>8.4</div>
                                <p style={{ fontSize: '14px', opacity: 0.8 }}>High-intensity overlap detected during primary banking hours.</p>
                            </div>
                        </aside>
                    </div>
                </main>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
