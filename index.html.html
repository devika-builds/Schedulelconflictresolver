<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Schedule Conflict Resolver</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #E4EAF0; }
  body { font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #2A3547; }
  * { box-sizing: border-box; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
  const { useState, useMemo, useEffect } = React;

  // Heritage Silver Palette
  const COLORS = {
    background: "#E4EAF0",
    cardBg: "#FAFBFD",
    text: "#2A3547",
    accent: "#6B7FAB",
    critical: "#E6D4E1"
  };

  const App = () => {
    return (
      <div style={{ padding: '40px', textAlign: 'center' }}>
        <h1 style={{ color: COLORS.text }}>Schedule Conflict Resolver</h1>
        <p style={{ color: COLORS.accent }}>System Active for April 15-19, 2026</p>
        <div style={{ background: COLORS.cardBg, padding: '20px', borderRadius: '12px', boxShadow: '0 4px 12px rgba(0,0,0,0.05)' }}>
          <p>The dashboard is loading correctly. System-builder mode initialized.</p>
        </div>
      </div>
    );
  };

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
</script>
</body>
</html>
